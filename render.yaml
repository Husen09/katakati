services:
  - type: web
    name: katakati-backend
    runtime: node
    plan: free
    buildCommand: npm install && npm --workspace backend run build
    startCommand: npm --workspace backend run start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PORT
        value: 4000
